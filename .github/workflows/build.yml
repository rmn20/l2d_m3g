name: Build l2d-m3g

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Create build directories
      run: mkdir -p build/classes build/raw dist META-INF

    - name: Create manifest file
      run: |
        cat > META-INF/MANIFEST.MF << 'EOF'
        Manifest-Version: 1.0
        Ant-Version: Apache Ant 1.8.4
        Created-By: 1.7.0_75-b13 (Oracle Corporation)
        MIDlet-1: L2DM3G,,home.Main
        MIDlet-Vendor: Vendor
        MIDlet-Name: l2d_m3g
        MIDlet-Version: 1.0
        MicroEdition-Configuration: CLDC-1.1
        MicroEdition-Profile: MIDP-2.0
        EOF

    - name: Compile Java sources
      run: |
        find src -name "*.java" > sources.txt
        echo "Found source files:"
        cat sources.txt
        javac -source 1.3 -target 1.3 \
          -bootclasspath libs/cldc11.jar:libs/midp21.jar:libs/jsr184.jar \
          -d build/classes \
          -encoding UTF-8 \
          @sources.txt

    - name: Create raw JAR
      run: |
        jar cvfm build/raw/l2dm3g.jar META-INF/MANIFEST.MF -C build/classes .
        jar uvf build/raw/l2dm3g.jar -C res .

    - name: Run ProGuard
      run: java -jar libs/proguard.jar @proguard.cfg

    - name: Generate JAD file
      run: |
        JAR_SIZE=$(stat -c%s dist/l2dm3g.jar)
        cat > dist/l2dm3g.jad << EOF
        MicroEdition-Configuration: CLDC-1.1
        MicroEdition-Profile: MIDP-2.0
        MIDlet-Vendor: Vendor
        MIDlet-Version: 1.0
        MIDlet-Name: l2d_m3g
        MIDlet-1: L2DM3G,,home.Main
        MIDlet-Jar-URL: l2dm3g.jar
        MIDlet-Jar-Size: ${JAR_SIZE}
        EOF

    - name: Show build info
      run: |
        echo "✓ Build completed!"
        echo "JAR size: $(stat -c%s dist/l2dm3g.jar) bytes"
        ls -la dist/

    - name: Upload game
      uses: actions/upload-artifact@v4
      with:
        name: l2d-m3g
        path: |
          dist/l2dm3g.jar
          dist/l2dm3g.jad

    - name: Upload ProGuard logs
      uses: actions/upload-artifact@v4
      with:
        name: proguard-logs
        path: |
          dist/pro_map.txt
          dist/pro_seeds.txt